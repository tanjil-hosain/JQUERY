<!DOCTYPE html>
<html>
<head>
    <title>Click Animation</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        .card{
            width:300px;
            height:350px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            cursor:pointer;
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        /* click করলে animation চলবে */
        .animate{
            animation: zoomIn 1.5s ease;
        }

        @keyframes zoomIn{

            0%{
                transform:
                    scale(2.5)
                    translateY(-200px);

                opacity:0;
            }

            100%{
                transform:
                    scale(1)
                    translateY(0);

                opacity:1;
            }
        }

    </style>
</head>
<body>

    <div class="card" id="card">
        <img id="img"
            src="https://picsum.photos/400/300">
    </div>

    <script>

        const card = document.getElementById("card");
        const img = document.getElementById("img");

        card.addEventListener("click", ()=>{

            img.classList.remove("animate");

            // animation restart করার জন্য
            void img.offsetWidth;

            img.classList.add("animate");

        });

    </script>

</body>
</html>
